<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="dashboard-header">
      <h1>Productivity Dashboard</h1>
      <button class="theme-toggle" aria-label="Toggle light/dark mode">🌙</button>
    </header>
    <main class="dashboard">

      <section id="greeting" class="widget">
        <h2 class="greeting-time"></h2>
        <p class="greeting-date"></p>
        <p class="greeting-message"></p>
        <form class="name-form">
          <input type="text" class="name-input" placeholder="Enter your name…" />
          <button type="submit">Save</button>
        </form>
      </section>

      <section id="timer" class="widget">
        <h3>🎯 Focus Timer</h3>
        <div class="timer-display">25:00</div>
        <div class="timer-controls">
          <button class="timer-start">Start</button>
          <button class="timer-stop" disabled>Stop</button>
          <button class="timer-reset">Reset</button>
        </div>
      </section>

      <section id="todo" class="widget">
        <h3>📝 To-Do List</h3>
        <form class="todo-form">
          <input type="text" class="todo-input" placeholder="Add a task…" />
          <button type="submit">Add</button>
        </form>
        <select class="todo-sort">
          <option value="creation">Creation order</option>
          <option value="alphabetical">Alphabetical</option>
          <option value="status">Status</option>
        </select>
        <ul class="todo-list"></ul>
      </section>

      <section id="links" class="widget">
        <h3>🔗 Quick Links</h3>
        <form class="links-form">
          <input type="text" class="links-label" placeholder="Label" />
          <input type="url" class="links-url" placeholder="https://…" />
          <button type="submit">Add</button>
        </form>
        <div class="links-list"></div>
      </section>

    </main>
    <script defer src="js/app.js"></script>
  </body>
</html>
